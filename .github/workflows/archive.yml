name: Archive LoRAs (HF -> single repo)

# Copies every source repo in repos.txt into ONE destination repo (ARCHIVE_REPO)
# as a subfolder. GitHub's runners do all the bandwidth; nothing touches your
# local machine. Idempotent: re-running only adds LoRAs not already in the archive.

on:
  workflow_dispatch:
    inputs:
      num_shards:
        description: "Number of shards to split the list into (run sequentially)"
        required: true
        default: "4"

permissions:
  contents: read

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - id: gen
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          n = int("${{ github.event.inputs.num_shards }}")
          print("shards=" + json.dumps(list(range(n))))
          PY

  copy:
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      # All commits target the SAME repo, so shards must run one at a time to
      # avoid concurrent-commit conflicts. Sharding is purely for checkpointing.
      max-parallel: 1
      matrix:
        shard: ${{ fromJson(needs.build-matrix.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet "huggingface_hub>=0.25"

      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Copy shard
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ARCHIVE_REPO: ${{ vars.ARCHIVE_REPO }}
          SKIP_REPOS: ${{ vars.SKIP_REPOS }}
          SHARD: ${{ matrix.shard }}
          NUM_SHARDS: ${{ github.event.inputs.num_shards }}
          BATCH_SIZE: "12"
        run: python mirror.py
